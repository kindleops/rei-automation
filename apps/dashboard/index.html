<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#06080e" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="NEXUS" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="stylesheet" crossorigin href="__NEXUS_MAIN_CSS__" id="nexus-main-css" />
    <title>NEXUS Command Center</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function () {
        var KEY = 'nexus:sw-recovery-generation'
        var GEN = '5'
        var ENTRY = '__NEXUS_MAIN_ENTRY__'
        var CSS = '__NEXUS_MAIN_CSS__'

        function ensureMainStylesheet() {
          if (!CSS || CSS.indexOf('__NEXUS_') === 0) return
          if (document.getElementById('nexus-main-css')) return
          var link = document.createElement('link')
          link.id = 'nexus-main-css'
          link.rel = 'stylesheet'
          link.crossOrigin = 'anonymous'
          link.href = CSS
          document.head.appendChild(link)
        }

        function loadApp() {
          ensureMainStylesheet()
          var script = document.createElement('script')
          script.type = 'module'
          script.crossOrigin = 'anonymous'
          script.src = ENTRY
          document.body.appendChild(script)
        }

        if (localStorage.getItem(KEY) === GEN) {
          loadApp()
          return
        }

        if (!('serviceWorker' in navigator)) {
          localStorage.setItem(KEY, GEN)
          loadApp()
          return
        }

        var hadController = Boolean(navigator.serviceWorker.controller)

        navigator.serviceWorker.getRegistrations().then(function (regs) {
          return Promise.all(regs.map(function (reg) { return reg.unregister() })).then(function () {
            return regs.length > 0 || hadController
          })
        }).then(function (hadServiceWorker) {
          if (!('caches' in window)) return hadServiceWorker
          return caches.keys().then(function (keys) {
            return Promise.all(keys.filter(function (key) {
              return key.indexOf('nexus-shell') === 0
            }).map(function (key) { return caches.delete(key) }))
          }).then(function () { return hadServiceWorker })
        }).then(function (hadServiceWorker) {
          localStorage.setItem(KEY, GEN)
          if (hadServiceWorker) {
            location.reload()
            return
          }
          loadApp()
        })
      })()
    </script>
  </body>
</html>
